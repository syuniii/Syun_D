<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:type" content="website">
    <meta property="og:title" content="션디">
    <meta property="og:description" content="Syun Design Portfolio">
    <meta property="og:image" content="../../img/thum.png">
    <title>Portfolio - 설계사무소 특화 상품 안내서 브로슈어</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- 공통 사이드바 -->
    <div id="sidebar-container"></div>

    <!-- 메인 -->
    <main class="content">
        <div class="detail-container">
            
            <div class="detail-image-wrap">
                <img style="margin-bottom: 5px;" src="./img/metalogy_01.png" alt="이미지">
                <img src="./img/metalogy_02.png" alt="이미지">
            </div>
            
            <div class="detail-info-wrap">
                <div class="detail-info-sticky">
                    <h2 class="detail-title">설계사무소 특화 상품 안내서 브로슈어</h2>
                    <p class="detail-category">디지털 / 소프트웨어·콘텐츠</p>
                    
                    <div class="detail-description">
                        <div class="info-section">
                            <h4>Overview</h4>
                            <p>
                                '메타로지' 의 설계사무소 특화 3DGS(3D Gaussian Splatting) 디지털 트윈 솔루션을 소개하는 상품 안내서입니다.
                                주요 상품 라인업의 세부 정보와 가격을 명확하게 전달하여 B2B 세일즈를 지원하는 데 목적을 두었습니다.
                            </p>
                        </div>
                        
                        <div class="info-section">
                            <h4>Role</h4>
                            <p>기획 / 디자인 100% 실무</p>
                        </div>
                        
                        <div class="info-section">
                            <h4>Duration</h4>
                            <p>소요기간 5일</p>
                        </div>
                    </div>
                    
                </div>
            </div>

        </div>
    </main>

    <!-- 푸터 -->
    <div id="footer-container"></div>

    <script src="../../script.js"></script>

</body>
</html>
