<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - 달고랭 알배기 알배추</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- 공통 사이드바 -->
    <div id="sidebar-container"></div>

    <main class="content">
        <div class="detail-container">
            
            <div class="detail-image-wrap">
                <img src="img/dalgolang.png" alt="상세페이지 원본">
            </div>
            
            <div class="detail-info-wrap">
                <div class="detail-info-sticky">
                    <h2 class="detail-title">달고랭 알배기 알배추</h2>
                    <p class="detail-category">식품 / 채소</p>
                    
                    <div class="detail-description">
                        <div class="info-section">
                            <h4>Overview</h4>
                            <p>
                                가상 농산물 브랜드 '달고랭' 의 알배추 판매를 위한 상세페이지 디자인 프로젝트입니다.
                                소비자에게 제품의 특장점과 브랜드의 신뢰도를 명확하게 전달하는 데 목적을 두었습니다.
                            </p>
                        </div>
                        
                        <div class="info-section">
                            <h4>Role</h4>
                            <p>기획 / 디자인 100% 개인 프로젝트</p>
                        </div>
                        
                        <div class="info-section">
                            <h4>Duration</h4>
                            <p>소요기간 3일</p>
                        </div>
                    </div>
                    
                </div>
            </div>

        </div>
    </main>

    <!-- 푸터 -->
    <div id="footer-container"></div>

    <script src="../../script.js"></script>

</body>
</html>
