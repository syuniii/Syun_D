<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:type" content="website">
    <meta property="og:title" content="션디">
    <meta property="og:description" content="Syun Design Portfolio">
    <meta property="og:image" content="../../img/thum.png">
    <title>Portfolio - 보보니 지퍼형 압축 파우치</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- 공통 사이드바 -->
    <div id="sidebar-container"></div>

    <!-- 메인 -->
    <main class="content">
        <div class="detail-container">
            
            <div class="detail-image-wrap">
                <img src="img/boboni.png" alt="상세페이지 원본">
            </div>
            
            <div class="detail-info-wrap">
                <div class="detail-info-sticky">
                    <h2 class="detail-title">보보니 지퍼형 압축 파우치</h2>
                    <p class="detail-category">리빙 / 수납</p>
                    
                    <div class="detail-description">
                        <div class="info-section">
                            <h4>Overview</h4>
                            <p>
                                수납용품 브랜드 '보보니' 의 지퍼형 압축 파우치 상세페이지 공모전 출품작입니다.
                                제품의 기능성과 편의성을 소비자에게 효과적으로 전달하는 데 목적을 두었습니다.
                            </p>
                        </div>
                        
                        <div class="info-section">
                            <h4>Role</h4>
                            <p>기획 및 디자인 100% 개인 프로젝트 (기존 상세페이지 레이아웃 참고 및 재구조화 진행)</p>
                        </div>
                        
                        <div class="info-section">
                            <h4>Duration</h4>
                            <p>소요기간 5일</p>
                        </div>
                    </div>
                    
                </div>
            </div>

        </div>
    </main>

    <!-- 푸터 -->
    <div id="footer-container"></div>

    <script src="../../script.js"></script>

</body>
</html>
