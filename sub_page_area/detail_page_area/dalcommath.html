<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:type" content="website">
    <meta property="og:title" content="션디">
    <meta property="og:description" content="Syun Design Portfolio">
    <meta property="og:image" content="../../img/thum.png">
    <title>Portfolio - 유아 로드맵 특강</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- 공통 사이드바 -->
    <div id="sidebar-container"></div>

    <!-- 메인 -->
    <main class="content">
        <div class="detail-container">
            
            <div class="detail-image-wrap">
                <img src="img/dalkommath.png" alt="상세페이지 원본">
            </div>
            
            <div class="detail-info-wrap">
                <div class="detail-info-sticky">
                    <h2 class="detail-title">유아 로드맵 특강</h2>
                    <p class="detail-category">교육 / 유아교육</p>
                    
                    <div class="detail-description">
                        <div class="info-section">
                            <h4>Overview</h4>
                            <p>
                                클라이언트 요청에 따라 미리캔버스로 제작한 상세페이지입니다.
                                친근한 비주얼과 명확한 정보 전달을 중심으로 교육 프로그램의 강점, 수강 혜택, 후기 콘텐츠를 효과적으로 구성하여 전환율 향상에 초점을 맞췄습니다.
                            </p>
                        </div>
                        
                        <div class="info-section">
                            <h4>Role</h4>
                            <p>디자인 100% 실무</p>
                        </div>
                        
                        <div class="info-section">
                            <h4>Duration</h4>
                            <p>소요기간 2일</p>
                        </div>
                    </div>
                    
                </div>
            </div>

        </div>
    </main>

    <!-- 푸터 -->
    <div id="footer-container"></div>

    <script src="../../script.js"></script>

</body>
</html>
