<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:type" content="website">
    <meta property="og:title" content="션디">
    <meta property="og:description" content="Syun Design Portfolio">
    <meta property="og:image" content="../../img/thum.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- 공통 사이드바 -->
    <div id="sidebar-container"></div>

    <!-- 메인 -->
    <main class="content">
        <div class="detail-container">
            
            <div class="detail-image-wrap">
                <img src="img/miseenscene.png" alt="상세페이지 원본">
            </div>
            
            <div class="detail-info-wrap">
                <div class="detail-info-sticky">
                    <h2 class="detail-title">미쟝센 컬링 에센스 2X</h2>
                    <p class="detail-category">뷰티 / 헤어</p>
                    
                    <div class="detail-description">
                        <div class="info-section">
                            <h4>Overview</h4>
                            <p>
                                헤어케어 브랜드 '미쟝센' 의 컬링 에센스 2X 상세페이지 프로젝트입니다.
                                제품의 핵심 강점인 보습 레이어링, 200도 열 보호 효과, 영양 공급, 프루티플로럴 향의 특징을 소비자에게 직관적으로 전달하는 데 목적을 두었습니다.
                            </p>
                        </div>
                        
                        <div class="info-section">
                            <h4>Role</h4>
                            <p>기획 / 디자인 100% 개인 프로젝트</p>
                        </div>
                        
                        <div class="info-section">
                            <h4>Duration</h4>
                            <p>소요기간 3일</p>
                        </div>
                    </div>
                    
                </div>
            </div>

        </div>

    <!-- 푸터 -->
    <div id="footer-container"></div>

    <script src="../../script.js"></script>
